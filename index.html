<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>榮富作業抽查抽籤系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .number-card {
            animation: pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
        }

        @keyframes pop-in {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .gradient-bg {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        }

        .school-logo {
            object-fit: contain;
            min-height: 80px;
        }

        /* 標示正取與備取的視覺效果 */
        .status-tag {
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 999px;
            font-weight: bold;
            z-index: 20;
        }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        <!-- 標題與校徽 -->
        <header class="text-center mb-10">
            <div class="flex flex-col items-center mb-4">
                <img src="lfes.png" alt="榮富國小校徽" class="school-logo h-24 w-auto mb-4 drop-shadow-md" onerror="this.parentElement.removeChild(this)">
                <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-2">榮富作業抽查抽籤系統</h1>
            </div>
            <p class="text-slate-500 font-medium">智慧分段・隨機啟始・正備取遞延邏輯</p>
        </header>

        <!-- 設定面板 -->
        <div id="setup-panel" class="bg-white rounded-3xl shadow-2xl p-8 border border-slate-100 transition-all">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- 最後一號 -->
                <div class="space-y-3">
                    <label class="block text-slate-700 font-bold flex items-center">
                        <svg class="w-5 h-5 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        班級最後一號 (1 ~ N)
                    </label>
                    <div class="flex items-center space-x-4">
                        <button onclick="adjustValue('maxNumber', -1)" class="w-12 h-12 bg-slate-100 text-slate-600 rounded-xl hover:bg-slate-200 transition font-black text-xl">-</button>
                        <input type="number" id="maxNumber" value="30" min="1" class="w-24 text-center border-2 border-slate-200 rounded-xl p-3 font-bold text-2xl focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all">
                        <button onclick="adjustValue('maxNumber', 1)" class="w-12 h-12 bg-slate-100 text-slate-600 rounded-xl hover:bg-slate-200 transition font-black text-xl">+</button>
                    </div>
                </div>

                <!-- 抽籤人數 -->
                <div class="space-y-3">
                    <label class="block text-slate-700 font-bold flex items-center">
                        <svg class="w-5 h-5 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                        每回抽籤人數
                    </label>
                    <div class="flex items-center space-x-4">
                        <button onclick="adjustValue('drawCount', -1)" class="w-12 h-12 bg-slate-100 text-slate-600 rounded-xl hover:bg-slate-200 transition font-black text-xl">-</button>
                        <input type="number" id="drawCount" value="6" min="1" class="w-24 text-center border-2 border-slate-200 rounded-xl p-3 font-bold text-2xl focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all">
                        <button onclick="adjustValue('drawCount', 1)" class="w-12 h-12 bg-slate-100 text-slate-600 rounded-xl hover:bg-slate-200 transition font-black text-xl">+</button>
                    </div>
                </div>

                <!-- 分段設定 -->
                <div class="md:col-span-2 p-6 bg-slate-50 rounded-2xl border border-slate-100 space-y-4">
                    <div class="flex items-center justify-between">
                        <label class="flex items-center cursor-pointer group">
                            <input type="checkbox" id="isSegmented" checked class="w-6 h-6 text-indigo-600 border-slate-300 rounded-lg focus:ring-indigo-500 transition cursor-pointer" onchange="toggleSegmentUI()">
                            <span class="ml-3 text-slate-700 font-bold text-lg group-hover:text-indigo-600 transition">啟用智慧分段輪流抽籤</span>
                        </label>
                    </div>
                    
                    <div id="segment-controls" class="flex flex-col md:flex-row md:items-center space-y-3 md:space-y-0 md:space-x-4 transition-all duration-300">
                        <span class="text-sm text-slate-500">分段點：</span>
                        <div class="flex items-center space-x-2">
                            <input type="number" id="splitPoint" value="15" class="w-24 text-center border-2 border-slate-200 rounded-lg p-2 font-bold focus:border-indigo-500 outline-none">
                            <button onclick="resetSplitPoint()" class="text-xs bg-white border border-slate-200 px-4 py-2 rounded-lg hover:border-indigo-400 hover:text-indigo-600 transition shadow-sm font-bold">重設中位數</button>
                        </div>
                    </div>
                    <div class="bg-indigo-100 p-3 rounded-xl border border-indigo-200">
                        <p class="text-xs text-indigo-800 font-bold flex items-center">
                            <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>
                            規則：前一半為「正取號碼」（下回排除），後一半為「備取號碼」（下回保留）。
                        </p>
                    </div>
                </div>
            </div>

            <button onclick="startInitialDraw()" class="mt-10 w-full gradient-bg text-white py-5 rounded-2xl font-black text-2xl shadow-xl hover:shadow-indigo-200 hover:-translate-y-1 transition-all active:scale-[0.98]">
                開始抽籤
            </button>
        </div>

        <!-- 結果面板 -->
        <div id="result-panel" class="hidden space-y-6">
            <!-- 歷史紀錄 -->
            <div id="history-container" class="flex flex-wrap gap-3"></div>

            <div class="bg-white rounded-3xl shadow-2xl p-10 text-center border border-slate-100 relative overflow-hidden">
                <div id="drawing-overlay" class="absolute inset-0 bg-white bg-opacity-90 z-10 flex flex-center flex-col items-center justify-center hidden">
                    <div class="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p class="text-indigo-600 font-bold animate-pulse text-xl">正在智慧抽取...</p>
                </div>

                <div id="round-label" class="inline-block px-6 py-2 bg-indigo-600 text-white rounded-full text-sm font-bold mb-6 tracking-widest shadow-lg">第一回抽籤</div>
                
                <div id="number-display" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6 mb-10">
                    <!-- 數字卡片 -->
                </div>

                <div class="flex flex-col md:flex-row justify-center gap-4 border-t pt-8">
                    <button id="btn-continue" onclick="continueDraw()" class="flex-1 bg-emerald-500 text-white py-5 rounded-2xl font-black text-xl hover:bg-emerald-600 transition shadow-lg active:scale-[0.98] flex items-center justify-center">
                        <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                        接續抽籤 (剩餘: <span id="remaining-rounds">2</span> 回)
                    </button>
                    <button onclick="resetSystem()" class="flex-1 bg-slate-500 text-white py-5 rounded-2xl font-black text-xl hover:bg-slate-600 transition shadow-lg active:scale-[0.98] flex items-center justify-center">
                        <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        重新開始
                    </button>
                </div>
            </div>
        </div>

        <!-- 自定義彈窗 -->
        <div id="message-box" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
            <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl scale-in transform transition-all border border-slate-100">
                <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                </div>
                <p id="message-text" class="text-xl font-bold text-slate-800 mb-6"></p>
                <button onclick="closeMessage()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-slate-700 transition shadow-md">知道了</button>
            </div>
        </div>
    </div>

    <script>
        let currentRound = 1;
        let drawnHistory = []; 
        let allExcludedNumbers = new Set(); // 存放正取（已排除）的號碼

        function adjustValue(id, delta) {
            const input = document.getElementById(id);
            let val = parseInt(input.value) + delta;
            if (val < 1) val = 1;
            input.value = val;
            if (id === 'maxNumber') resetSplitPoint();
        }

        function resetSplitPoint() {
            const max = parseInt(document.getElementById('maxNumber').value || 30);
            const val = Math.floor(max / 2);
            document.getElementById('splitPoint').value = val;
        }

        function toggleSegmentUI() {
            const isChecked = document.getElementById('isSegmented').checked;
            const controls = document.getElementById('segment-controls');
            controls.style.opacity = isChecked ? '1' : '0.4';
            controls.style.pointerEvents = isChecked ? 'auto' : 'none';
        }

        function showMessage(text) {
            document.getElementById('message-text').innerText = text;
            document.getElementById('message-box').classList.remove('hidden');
        }

        function closeMessage() {
            document.getElementById('message-box').classList.add('hidden');
        }

        function startInitialDraw() {
            const max = parseInt(document.getElementById('maxNumber').value);
            const count = parseInt(document.getElementById('drawCount').value);
            if (count > max) {
                showMessage(`抽籤人數 (${count}) 不能大於總人數 (${max})！`);
                return;
            }
            resetState();
            executeDraw();
        }

        function resetState() {
            currentRound = 1;
            drawnHistory = [];
            allExcludedNumbers.clear();
        }

        async function executeDraw() {
            const max = parseInt(document.getElementById('maxNumber').value);
            const count = parseInt(document.getElementById('drawCount').value);
            const isSegmented = document.getElementById('isSegmented').checked;
            const split = parseInt(document.getElementById('splitPoint').value);

            const overlay = document.getElementById('drawing-overlay');
            overlay.classList.remove('hidden');
            document.getElementById('setup-panel').classList.add('hidden');
            document.getElementById('result-panel').classList.remove('hidden');

            await new Promise(resolve => setTimeout(resolve, 800));

            let winners = [];

            if (isSegmented) {
                let poolA = []; 
                let poolB = []; 
                for (let i = 1; i <= max; i++) {
                    if (!allExcludedNumbers.has(i)) {
                        if (i <= split) poolA.push(i);
                        else poolB.push(i);
                    }
                }

                let countA = Math.floor(count / 2);
                let countB = count - countA;

                if (poolA.length < countA) { countB += (countA - poolA.length); countA = poolA.length; }
                if (poolB.length < countB) { countA += (countB - poolB.length); countB = poolB.length; }

                if (poolA.length + poolB.length < count) {
                    overlay.classList.add('hidden');
                    showMessage('剩餘人數不足以進行抽籤！');
                    return;
                }

                let picksA = pickRandom(poolA, countA);
                let picksB = pickRandom(poolB, countB);

                let startWithA = Math.random() < 0.5;
                let i = 0, j = 0;

                while (winners.length < count) {
                    if (startWithA) {
                        if (i < picksA.length) { winners.push(picksA[i++]); startWithA = false; }
                        else if (j < picksB.length) { winners.push(picksB[j++]); }
                    } else {
                        if (j < picksB.length) { winners.push(picksB[j++]); startWithA = true; }
                        else if (i < picksA.length) { winners.push(picksA[i++]); }
                    }
                    if (i >= picksA.length && j >= picksB.length) break;
                }
            } else {
                let pool = [];
                for (let i = 1; i <= max; i++) {
                    if (!allExcludedNumbers.has(i)) pool.push(i);
                }
                if (pool.length < count) {
                    overlay.classList.add('hidden');
                    showMessage('剩餘人數不足以進行抽籤！');
                    return;
                }
                winners = pickRandom(pool, count);
            }

            drawnHistory.push(winners);
            
            // 將前一半號碼加入排除名單（正取）
            const excludeLimit = Math.floor(winners.length / 2);
            for (let k = 0; k < excludeLimit; k++) {
                allExcludedNumbers.add(winners[k]);
            }

            overlay.classList.add('hidden');
            renderResults();
        }

        function pickRandom(array, n) {
            let result = [...array];
            for (let i = result.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }
            return result.slice(0, n);
        }

        function renderResults() {
            const label = document.getElementById('round-label');
            label.innerText = `第 ${currentRound} 回抽籤`;
            
            const colors = ['bg-indigo-600', 'bg-purple-600', 'bg-fuchsia-600'];
            label.className = `inline-block px-6 py-2 ${colors[currentRound-1] || 'bg-slate-600'} text-white rounded-full text-sm font-bold mb-6 tracking-widest shadow-lg`;

            const display = document.getElementById('number-display');
            display.innerHTML = '';
            
            const currentWinners = drawnHistory[currentRound - 1];
            const excludeLimit = Math.floor(currentWinners.length / 2);

            currentWinners.forEach((num, index) => {
                const card = document.createElement('div');
                const isExcluded = index < excludeLimit;
                
                // 改為藍色 (blue) 與 綠色 (emerald)
                card.className = `number-card bg-white border-2 ${isExcluded ? 'border-blue-200' : 'border-emerald-200'} rounded-3xl flex flex-col items-center justify-center p-6 shadow-xl relative group`;
                card.style.animationDelay = `${index * 0.1}s`;
                
                const tag = document.createElement('div');
                tag.className = `status-tag ${isExcluded ? 'bg-blue-500 text-white' : 'bg-emerald-500 text-white'}`;
                tag.innerText = isExcluded ? '正取號碼' : '備取號碼';
                card.appendChild(tag);

                card.innerHTML += `
                    <span class="text-xs font-bold text-slate-400 mb-1 uppercase tracking-tighter">號碼</span>
                    <span class="text-4xl md:text-5xl font-black ${isExcluded ? 'text-blue-600' : 'text-emerald-600'}">${num}</span>
                `;
                display.appendChild(card);
            });

            renderHistory();

            const continueBtn = document.getElementById('btn-continue');
            const remaining = 3 - currentRound;
            document.getElementById('remaining-rounds').innerText = remaining;
            
            if (remaining <= 0) {
                continueBtn.classList.add('opacity-40', 'grayscale', 'cursor-not-allowed');
                continueBtn.disabled = true;
            } else {
                continueBtn.classList.remove('opacity-40', 'grayscale', 'cursor-not-allowed');
                continueBtn.disabled = false;
            }
        }

        function renderHistory() {
            const historyContainer = document.getElementById('history-container');
            historyContainer.innerHTML = '';
            drawnHistory.forEach((winners, idx) => {
                const isCurrent = (idx + 1 === currentRound);
                const box = document.createElement('div');
                box.className = `flex items-center px-4 py-3 rounded-2xl text-sm font-bold border transition-all ${isCurrent ? 'bg-indigo-50 border-indigo-200 text-indigo-700 ring-2 ring-indigo-100' : 'bg-slate-50 border-slate-200 text-slate-500'}`;
                
                const excludeLimit = Math.floor(winners.length / 2);
                const excludedStr = winners.slice(0, excludeLimit).join('、');
                const retainedStr = winners.slice(excludeLimit).join('、');

                box.innerHTML = `
                    <div class="w-6 h-6 rounded-full flex items-center justify-center mr-3 ${isCurrent ? 'bg-indigo-600 text-white' : 'bg-slate-300 text-white'} text-[10px]">
                        ${idx + 1}
                    </div>
                    <div class="flex flex-col">
                        <span>第 ${idx + 1} 回結果：<span class="text-blue-600">${excludedStr} (正)</span> | <span class="text-emerald-600">${retainedStr} (備)</span></span>
                    </div>
                `;
                historyContainer.appendChild(box);
            });
        }

        function continueDraw() {
            if (currentRound >= 3) return;
            currentRound++;
            executeDraw();
        }

        function resetSystem() {
            resetState();
            document.getElementById('setup-panel').classList.remove('hidden');
            document.getElementById('result-panel').classList.add('hidden');
            const continueBtn = document.getElementById('btn-continue');
            continueBtn.classList.remove('opacity-40', 'grayscale', 'cursor-not-allowed');
            continueBtn.disabled = false;
        }

        window.onload = () => {
            resetSplitPoint();
            toggleSegmentUI();
        };
    </script>
</body>
</html>
